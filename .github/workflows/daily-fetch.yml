name: Daily fetch robot tender leads

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      max_leads:
        description: '每个源最多抓多少条'
        required: false
        default: '25'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run fetch_leads.py
        env:
          MAX_LEADS_PER_SOURCE: ${{ github.event.inputs.max_leads || '25' }}
        run: |
          python3 fetch_leads.py 2>&1 | tee fetch.log

      - name: Commit
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js fetch.log
          git diff --staged --quiet && exit 0
          git commit -m "chore: auto-fetch leads $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
