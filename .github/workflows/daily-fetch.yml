name: Daily fetch robot tender leads

# 每天北京时间 8:00 (UTC 0:00) 自动跑
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:  # 也能手动触发
    inputs:
      max_leads:
        description: '每个源最多抓多少条'
        required: false
        default: '25'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run fetch_leads.py
        env:
          MAX_LEADS_PER_SOURCE: ${{ github.event.inputs.max_leads || '25' }}
        run: |
          python3 fetch_leads.py 2>&1 | tee fetch.log

      - name: Show stats
        if: always()
        run: |
          echo "### Fetch log" >> $GITHUB_STEP_SUMMARY
          tail -50 fetch.log >> $GITHUB_STEP_SUMMARY || true
          echo "### Data file size" >> $GITHUB_STEP_SUMMARY
          wc -l data.js >> $GITHUB_STEP_SUMMARY

      - name: Rebuild fragment
        if: success()
        run: |
          # 自动重建 fragment 放入 visualization 目录
          mkdir -p .codex/visualizations/$(date +%Y/%m/%d)/${{ github.run_id }}
          python3 << 'PY'
          import re, os
          base = "/home/runner/work/$(basename $GITHUB_REPOSITORY)/$(basename $GITHUB_REPOSITORY)"
          # 简化: 不用 tailwind, 直接 inline 完整 HTML
          with open(f"{base}/index.html") as f: html = f.read()
          with open(f"{base}/data.js") as f: data = f.read()
          with open(f"{base}/app.js") as f: app = f.read()
          html = re.sub(r'<script src="\./data\.js"></script>', lambda m: '<script>' + data + '</script>', html)
          html = re.sub(r'<script src="\./app\.js"></script>', lambda m: '<script>' + app + '</script>', html)
          out = f".codex/visualizations/$(date +%Y/%m/%d)/${{ github.run_id }}/robot-leads-query.html"
          with open(out, 'w') as f: f.write(html)
          print(f"Wrote {out}")
          PY

      - name: Commit changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js index.html fetch.log 2>/dev/null || true
          # 只在 data.js 有变化时提交
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: auto-fetch robot leads $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Failure notification (optional)
        if: failure()
        run: |
          echo "::error::fetch_leads.py failed. Check fetch.log for details."
