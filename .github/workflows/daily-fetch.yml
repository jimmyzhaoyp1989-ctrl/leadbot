name: Daily fetch robot tender leads

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      max_leads:
        description: '每源最多抓多少条'
        required: false
        default: '25'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Playwright
        run: pip install playwright && playwright install --with-deps chromium
      - name: Run fetch_leads.py
        run: python3 fetch_leads.py 2>&1 | tee fetch.log
      - name: Commit
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js fetch.log
          git diff --staged --quiet && exit 0
          git commit -m "auto-fetch $(date -u +%Y-%m-%d)"
          git push
